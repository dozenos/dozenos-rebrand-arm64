# BlueField-2 DPU images: a fully-installed disk image, plus the ISO.
#
# The qcow2 is a fully-installed disk (EFI + root, squashfs + GRUB already laid
# down by raw_image.py) -- first boot comes up installed, with no interactive
# `install image` step. The BFB wrap job (bfb/) flashes it onto the DPU eMMC;
# by hand it would be:
#     qemu-img convert -f qcow2 -O raw dozenos-*-dpu-arm64.qcow2 disk.raw
#     dd if=disk.raw of=/dev/mmcblk0 bs=4M   # on the DPU, from the installer
#
# The ISO is for `add system image` on a DPU that is already running DozenOS --
# an in-system upgrade, no reflash and no host access needed. It costs nothing
# to publish: the build produces an ISO first regardless and derives the raw
# and qcow2 from it, so listing "iso" here only stops it being filtered out of
# the release. There is no separate upgrade/ flavor because the DPU carries no
# cloud-init, which is the only thing the aws split exists to leave out.
#
# qcow2 (compressed) rather than a bare raw: a raw sized to the eMMC would be
# a multi-GB release asset (GitHub does not sparse-compress assets), whereas
# a compressed qcow2 of a mostly-empty disk is ~1 GB. Same disk contents.
#
# disk_size = 16: MUST be <= your BF2 board's eMMC size (BF2 eMMC is commonly
# 16/32/64 GB). dd of a 16 GB image onto a smaller eMMC fails; onto a larger
# one it leaves the tail unused (fine for bring-up). Tune to your board.
#
# console: ttyAMA0 is the BF2 UART reaching the DPU BMC's console server
# (`ssh -p 2200 root@<bmc>`), and DozenOS derives its getty from whatever
# `console=` GRUB puts on the cmdline -- so this is what makes the installed
# system loginable. hvc0 (the rshim TMFIFO console) is deliberately NOT the
# choice here: it depends on MLXBF_TMFIFO being up and has not proven reliable
# on this hardware, whereas ttyAMA0 carries output from firmware onwards.
#
# rshim is deliberately NOT installed: it is a HOST-side driver (pushes boot
# streams / serves the tmfifo console+net from the host). The DPU side is
# reachable via the in-tree MLXBF_TMFIFO (tmfifo_net0 + console) and
# MLXBF_GIGE (OOB port) drivers enabled in the arm64 kernel config.

image_format = ["qcow2", "iso"]
image_opts = "-c"

disk_size = 16

[boot_settings]
console_type = "ttyAMA"
console_num = "0"
console_speed = "115200"
